<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive GIS map of Hunza Valley - explore tourist points, hotels, villages, passes, glaciers, and trails in Gilgit-Baltistan, Pakistan.">
    <meta name="keywords" content="Hunza, GIS, Map, Tourism, Gilgit-Baltistan, Pakistan, Karimabad, Khunjerab, Passu">
    <title>GeoMapInk - Interactive Map of Hunza Valley</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/geo.css" />
</head>
<body>

    <!-- Loading overlay -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>Loading map data...</p>
    </div>

    <!-- Header -->
    <header id="app-header">
        <div class="header-brand">
            <span class="header-icon">🗺️</span>
            <h1>GeoMapInk</h1>
            <span class="header-subtitle">Interactive Map of Hunza Valley</span>
        </div>
        <div class="header-actions">
            <button id="fullscreen-btn" class="header-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">
                <i class="fas fa-expand"></i>
            </button>
            <button id="geolocate-btn" class="header-btn" onclick="geolocateUser()" title="Find My Location">
                <i class="fas fa-location-crosshairs"></i>
            </button>
        </div>
    </header>

    <div id="map-container">
        <div id="map"></div>

        <!-- Sidebar toggle for mobile -->
        <button id="sidebar-toggle" onclick="toggleSidebar()">
            <i class="fas fa-layer-group"></i>
        </button>

        <div class="right-sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Layers & Controls</h2>
                <button class="sidebar-close" onclick="toggleSidebar()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search places...">
                <button onclick="searchData()" class="search-btn">Go</button>
            </div>

            <div class="checkbox-container">
                <h3 class="section-title">Map Layers</h3>
                <label class="layer-item">
                    <input type="checkbox" id="boundaryCheckbox" checked>
                    <span class="layer-icon" style="color:#3388ff"><i class="fas fa-draw-polygon"></i></span>
                    Boundary
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="hotelCheckbox" checked>
                    <span class="layer-icon" style="color:#e74c3c"><i class="fas fa-hotel"></i></span>
                    Hotels
                </label>

                <h3 class="section-title">Roads</h3>
                <div class="sub-checkbox">
                    <label class="layer-item">
                        <input type="checkbox" id="highwaysCheckbox" checked>
                        <span class="layer-icon" style="color:#2980b9"><i class="fas fa-road"></i></span>
                        Highways
                    </label>
                    <label class="layer-item">
                        <input type="checkbox" id="linkRoadsCheckbox" checked>
                        <span class="layer-icon" style="color:#2c3e50"><i class="fas fa-road"></i></span>
                        Link Roads
                    </label>
                    <label class="layer-item">
                        <input type="checkbox" id="residentRoadsCheckbox" checked>
                        <span class="layer-icon" style="color:#f39c12"><i class="fas fa-road"></i></span>
                        Residential Roads
                    </label>
                </div>

                <h3 class="section-title">Points of Interest</h3>
                <label class="layer-item">
                    <input type="checkbox" id="touristPointsCheckbox" checked>
                    <span class="layer-icon" style="color:#e67e22"><i class="fas fa-camera"></i></span>
                    Tourist Points
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="villagesCheckbox" checked>
                    <span class="layer-icon" style="color:#27ae60"><i class="fas fa-home"></i></span>
                    Villages
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="passesCheckbox" checked>
                    <span class="layer-icon" style="color:#8e44ad"><i class="fas fa-mountain"></i></span>
                    Passes
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="tracksCheckbox" checked>
                    <span class="layer-icon" style="color:#16a085"><i class="fas fa-hiking"></i></span>
                    Tracks
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="glaciersCheckbox">
                    <span class="layer-icon" style="color:#87CEEB"><i class="fas fa-snowflake"></i></span>
                    Glaciers
                </label>
            </div>

            <div class="button-container">
                <button class="action-btn print-btn" onclick="printMap()">
                    <i class="fas fa-print"></i> Print Map
                </button>
                <button class="action-btn reset-btn" onclick="resetZoom()">
                    <i class="fas fa-undo"></i> Reset Zoom
                </button>
            </div>

            <div class="sidebar-footer">
                Project of NCRG: IST Karachi<br>
                Developed by Israr Ahmad<br>
                <strong>@GeoMapInk</strong>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-ajax/dist/leaflet.ajax.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="js/geo.js"></script>
</body>
</html>
